name: Manual Test Run

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - glue
          - api
          - frontend

permissions:
  contents: read

jobs:
  glue-tests:
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'glue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          cd data/glue
          pip install -r requirements.txt
      
      - name: Run Glue tests
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          JOBS_TABLE_NAME: test-jobs-table
        run: |
          cd data/glue
          pytest test_process.py -v --cov --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage report
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: ./data/glue/coverage.xml
          flags: glue

  api-tests:
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'api'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend/api
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run API tests
        run: |
          cd backend/api
          pytest tests/ -v --cov --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage report
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: ./backend/api/coverage.xml
          flags: api

  frontend-tests:
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'frontend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  test-summary:
    needs: [glue-tests, api-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Results Summary
        run: |
          echo "## Manual Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Suite**: ${{ github.event.inputs.test_suite }}" >> $GITHUB_STEP_SUMMARY
          echo "**Glue Tests**: ${{ needs.glue-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**API Tests**: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend Tests**: ${{ needs.frontend-tests.result }}" >> $GITHUB_STEP_SUMMARY
